<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employees – HRMS</title>
  <meta name="description" content="HR Management System – Employee Management (Admin)"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="app-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">HR</div>
        <div><h1>HRMS</h1><span>Management System</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="dashboard.html" class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="employee.html"  class="nav-link active admin-only"><span class="nav-icon">👥</span> Employees</a>
        <a href="attendance.html" class="nav-link"><span class="nav-icon">📅</span> Attendance</a>
        <a href="leave.html"     class="nav-link"><span class="nav-icon">🏖</span> Leave</a>
        <a href="payroll.html"   class="nav-link"><span class="nav-icon">💰</span> Payroll</a>
        <a href="profile.html"   class="nav-link"><span class="nav-icon">👤</span> My Profile</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">A</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Loading…</div>
            <div class="user-role" id="sidebar-user-role"></div>
          </div>
        </div>
        <button class="btn btn-logout" id="logout-btn">🚪 Sign Out</button>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2>👥 Employee Management</h2>
          <p>Add, edit, or remove employee records</p>
        </div>
        <button class="btn btn-primary" id="btn-add-emp" onclick="openAddModal()">
          ➕ Add Employee
        </button>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <input type="text" id="search-input" class="search-box" placeholder="🔍  Search by name, email or department…"/>
        <select id="dept-filter" class="form-control" style="max-width:180px;">
          <option value="">All Departments</option>
          <option>Engineering</option>
          <option>Marketing</option>
          <option>HR</option>
          <option>Finance</option>
          <option>Operations</option>
          <option>Management</option>
        </select>
      </div>

      <!-- Employee Table -->
      <div class="glass-card">
        <div class="table-wrapper">
          <table id="emp-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Department</th>
                <th>Role</th>
                <th>Salary</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="emp-tbody">
              <tr>
                <td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted);">Loading employees…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== ADD / EDIT MODAL ===== -->
  <div class="modal-overlay" id="emp-modal">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">➕ Add Employee</h3>
        <button class="modal-close" onclick="closeModal('emp-modal')">✕</button>
      </div>
      <form id="emp-form">
        <input type="hidden" id="emp-id" value=""/>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Full Name <span style="color:var(--danger)">*</span></label>
            <input id="f-name" type="text" class="form-control" placeholder="Alice Johnson" required/>
          </div>
          <div class="form-group">
            <label class="form-label">Email <span style="color:var(--danger)">*</span></label>
            <input id="f-email" type="email" class="form-control" placeholder="alice@hrms.com" required/>
          </div>
          <div class="form-group" id="password-group">
            <label class="form-label">Password <span style="color:var(--danger)">*</span></label>
            <input id="f-password" type="password" class="form-control" placeholder="Min 6 chars"/>
          </div>
          <div class="form-group">
            <label class="form-label">Department <span style="color:var(--danger)">*</span></label>
            <select id="f-dept" class="form-select" required>
              <option value="">Select dept…</option>
              <option>Engineering</option>
              <option>Marketing</option>
              <option>HR</option>
              <option>Finance</option>
              <option>Operations</option>
              <option>Management</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Role</label>
            <select id="f-role" class="form-select">
              <option value="employee">Employee</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Salary (₹)</label>
            <input id="f-salary" type="number" class="form-control" placeholder="e.g. 60000" min="0"/>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('emp-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary" id="save-btn">💾 Save Employee</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/main.js"></script>
  <script>
    const user = requireAuth('admin');
    if (!user) throw new Error('Forbidden');
    initSidebar();

    let employees = [];

    // ---- Load Employees ----
    async function loadEmployees() {
      employees = await apiGet('api/employees') || [];
      renderTable(employees);
    }

    function renderTable(list) {
      const tbody = document.getElementById('emp-tbody');
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-icon">👤</div><p>No employees found.</p></div></td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((e, i) => `
        <tr>
          <td>${i + 1}</td>
          <td><strong>${e.name}</strong></td>
          <td>${e.email}</td>
          <td><span class="badge badge-muted">${e.department || '—'}</span></td>
          <td>${statusBadge(e.role)}</td>
          <td>${formatCurrency(e.salary)}</td>
          <td>
            <button class="btn btn-primary btn-sm" onclick="openEditModal(${e.id})">✏️ Edit</button>
            <button class="btn btn-danger  btn-sm" onclick="deleteEmployee(${e.id}, '${e.name}')">🗑 Delete</button>
          </td>
        </tr>
      `).join('');
    }

    // ---- Search & Filter ----
    const searchInput = document.getElementById('search-input');
    const deptFilter  = document.getElementById('dept-filter');

    function filterEmployees() {
      const q    = searchInput.value.toLowerCase();
      const dept = deptFilter.value;
      const filtered = employees.filter(e =>
        (!dept || e.department === dept) &&
        (e.name.toLowerCase().includes(q) || e.email.toLowerCase().includes(q) || (e.department||'').toLowerCase().includes(q))
      );
      renderTable(filtered);
    }

    searchInput.addEventListener('input', debounce(filterEmployees));
    deptFilter.addEventListener('change', filterEmployees);

    // ---- Modal: Add ----
    function openAddModal() {
      document.getElementById('modal-title').textContent = '➕ Add Employee';
      document.getElementById('emp-form').reset();
      document.getElementById('emp-id').value = '';
      document.getElementById('password-group').style.display = '';
      document.getElementById('f-password').required = true;
      openModal('emp-modal');
    }

    // ---- Modal: Edit ----
    function openEditModal(id) {
      const emp = employees.find(e => e.id === id);
      if (!emp) return;
      document.getElementById('modal-title').textContent = '✏️ Edit Employee';
      document.getElementById('emp-id').value   = emp.id;
      document.getElementById('f-name').value   = emp.name;
      document.getElementById('f-email').value  = emp.email;
      document.getElementById('f-dept').value   = emp.department || '';
      document.getElementById('f-role').value   = emp.role;
      document.getElementById('f-salary').value = emp.salary;
      // Hide password field on edit
      document.getElementById('password-group').style.display = 'none';
      document.getElementById('f-password').required = false;
      openModal('emp-modal');
    }

    // ---- Form Submit ----
    document.getElementById('emp-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const id = document.getElementById('emp-id').value;
      const params = {
        name:       document.getElementById('f-name').value,
        email:      document.getElementById('f-email').value,
        department: document.getElementById('f-dept').value,
        role:       document.getElementById('f-role').value,
        salary:     document.getElementById('f-salary').value,
      };
      if (id) {
        params.id = id;
        params._method = 'PUT';
      } else {
        params.password = document.getElementById('f-password').value;
      }
      const data = await apiPost('api/employees', params);
      if (data && data.success) {
        showToast(data.message, 'success');
        closeModal('emp-modal');
        loadEmployees();
      } else {
        showToast((data && data.message) || 'Operation failed.', 'error');
      }
    });

    // ---- Delete ----
    async function deleteEmployee(id, name) {
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      const data = await apiPost('api/employees', { id, _method: 'DELETE' });
      if (data && data.success) {
        showToast('Employee deleted.', 'success');
        loadEmployees();
      } else {
        showToast('Delete failed.', 'error');
      }
    }

    loadEmployees();
  </script>
</body>
</html>
