<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leave – HRMS</title>
  <meta name="description" content="HR Management System – Leave Management"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="gradient-bg"></div>
  <div class="app-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">HR</div>
        <div><h1>HRMS</h1><span>Management System</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="dashboard.html"  class="nav-link"><span class="nav-icon">📊</span> Dashboard</a>
        <a href="employee.html"   class="nav-link admin-only"><span class="nav-icon">👥</span> Employees</a>
        <a href="attendance.html" class="nav-link"><span class="nav-icon">📅</span> Attendance</a>
        <a href="leave.html"      class="nav-link active"><span class="nav-icon">🏖</span> Leave</a>
        <a href="payroll.html"    class="nav-link"><span class="nav-icon">💰</span> Payroll</a>
        <a href="profile.html"    class="nav-link"><span class="nav-icon">👤</span> My Profile</a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info">
          <div class="user-avatar" id="sidebar-avatar">A</div>
          <div>
            <div class="user-name" id="sidebar-user-name">Loading…</div>
            <div class="user-role" id="sidebar-user-role"></div>
          </div>
        </div>
        <button class="btn btn-logout" id="logout-btn">🚪 Sign Out</button>
      </div>
    </aside>

    <!-- ===== MAIN CONTENT ===== -->
    <main class="main-content">
      <div class="page-header">
        <div>
          <h2>🏖 Leave Management</h2>
          <p id="leave-subtitle">Manage and track leave requests</p>
        </div>
        <!-- Apply button (employee only) -->
        <button id="btn-apply" class="btn btn-primary" onclick="openModal('apply-modal')" style="display:none;">
          ➕ Apply for Leave
        </button>
      </div>

      <!-- Leave Table -->
      <div class="glass-card">
        <div style="padding:18px 20px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;">
          <h3 style="font-size:15px;color:var(--text-secondary);">Leave Requests</h3>
          <input type="text" id="leave-search" class="search-box" placeholder="🔍 Filter…" style="max-width:240px;"/>
        </div>
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th id="col-emp" style="display:none;">Employee</th>
                <th>Reason</th>
                <th>From</th>
                <th>To</th>
                <th>Status</th>
                <th id="col-action" style="display:none;">Actions</th>
              </tr>
            </thead>
            <tbody id="leave-tbody">
              <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--text-muted);">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== APPLY LEAVE MODAL ===== -->
  <div class="modal-overlay" id="apply-modal">
    <div class="modal">
      <div class="modal-header">
        <h3>🏖 Apply for Leave</h3>
        <button class="modal-close" onclick="closeModal('apply-modal')">✕</button>
      </div>
      <form id="apply-form">
        <div class="form-group">
          <label class="form-label">Reason <span style="color:var(--danger)">*</span></label>
          <input id="f-reason" type="text" class="form-control" placeholder="e.g. Medical, Personal, Vacation" required/>
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">From Date <span style="color:var(--danger)">*</span></label>
            <input id="f-from" type="date" class="form-control" required/>
          </div>
          <div class="form-group">
            <label class="form-label">To Date <span style="color:var(--danger)">*</span></label>
            <input id="f-to" type="date" class="form-control" required/>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-ghost" onclick="closeModal('apply-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">📤 Submit Application</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast-container"></div>
  <script src="js/main.js"></script>
  <script>
    const user = requireAuth();
    if (!user) throw new Error('Not authenticated');
    initSidebar();

    const isAdmin = user.role === 'admin';
    let allLeaves = [];

    // Show / hide role-specific elements
    if (!isAdmin) {
      document.getElementById('btn-apply').style.display = '';
      document.getElementById('leave-subtitle').textContent = 'Apply for leave and track your requests';
    } else {
      document.getElementById('col-emp').style.display    = '';
      document.getElementById('col-action').style.display = '';
    }

    // Set default dates to today
    const today = todayStr();
    document.getElementById('f-from').value = today;
    document.getElementById('f-to').value   = today;
    document.getElementById('f-from').min   = today;
    document.getElementById('f-to').min     = today;

    // ---- Load Leaves ----
    async function loadLeaves() {
      allLeaves = await apiGet('api/leaves') || [];
      renderTable(allLeaves);
    }

    function renderTable(list) {
      const tbody = document.getElementById('leave-tbody');
      const cols   = isAdmin ? 7 : 6;
      if (!list.length) {
        tbody.innerHTML = `<tr><td colspan="${cols}"><div class="empty-state"><div class="empty-icon">🏖</div><p>No leave requests found.</p></div></td></tr>`;
        return;
      }
      tbody.innerHTML = list.map((l, i) => `
        <tr>
          <td>${i + 1}</td>
          ${isAdmin ? `<td><strong>${l.empName || '—'}</strong></td>` : ''}
          <td>${l.reason || '—'}</td>
          <td>${formatDate(l.fromDate)}</td>
          <td>${formatDate(l.toDate)}</td>
          <td>${statusBadge(l.status)}</td>
          ${isAdmin && l.status === 'Pending' ? `
            <td>
              <button class="btn btn-success btn-sm" onclick="updateLeave(${l.id},'Approved')">✅ Approve</button>
              <button class="btn btn-danger  btn-sm" onclick="updateLeave(${l.id},'Rejected')">❌ Reject</button>
            </td>` : (isAdmin ? `<td>—</td>` : '')}
        </tr>
      `).join('');
    }

    // ---- Filter ----
    document.getElementById('leave-search').addEventListener('input', debounce(e => {
      const q = e.target.value.toLowerCase();
      renderTable(allLeaves.filter(l =>
        (l.empName || '').toLowerCase().includes(q) ||
        (l.reason  || '').toLowerCase().includes(q) ||
        (l.status  || '').toLowerCase().includes(q)
      ));
    }));

    // ---- Apply Leave ----
    document.getElementById('apply-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const reason   = document.getElementById('f-reason').value;
      const fromDate = document.getElementById('f-from').value;
      const toDate   = document.getElementById('f-to').value;
      if (fromDate > toDate) { showToast('"To" date must be after "From" date.', 'error'); return; }
      const data = await apiPost('api/leaves', { reason, fromDate, toDate });
      if (data && data.success) {
        showToast('Leave application submitted! ✅', 'success');
        closeModal('apply-modal');
        document.getElementById('apply-form').reset();
        loadLeaves();
      } else {
        showToast((data && data.message) || 'Failed.', 'error');
      }
    });

    // ---- Approve / Reject (Admin) ----
    async function updateLeave(leaveId, status) {
      const data = await apiPost('api/leaves', { _method:'PUT', leaveId, status });
      if (data && data.success) {
        showToast(`Leave ${status.toLowerCase()}.`, 'success');
        loadLeaves();
      } else {
        showToast('Update failed.', 'error');
      }
    }

    loadLeaves();
  </script>
</body>
</html>
